server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  jackson:
    serialization:
      indent_output: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

google:
  project-id: ${GOOGLE_PROJECT_ID:veglens}
  location: ${GOOGLE_LOCATION:us-central1}

vertex:
  enabled: false
  model: ${VERTEX_MODEL:gemini-2.5-flash-lite}
veglens:
  kb:
    path: classpath:kb/ingredients-kb.json
